<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th_Lesson</title>
</head>
<style>
    body {
        background-color: lightgray;
        display: flex;
    }

    .main {
        margin: auto;
        display: block;
        align-items: center;
        justify-content: center;
        background-color: white;
        width: 800px;
        height: 500px;
        border-radius: 25px;
    }

    .idk {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 15px;
    }
</style>

<body>
    <form action="">
        <fieldset>
            <legend>Sign Up</legend>
            <div class="main">
                <p style="justify-content: center; display: flex; font-weight: bold;">Sign Up</p>
                <div class="idk">
                    <label for="userid">ID: </label>
                    <input type="text" name="" id="userid" placeholder="id">
                </div>
                <div class="idk">
                    <label for="userpw">Password: </label>
                    <input type="password" name="" id="userpw" placeholder="password">
                </div>
                <div class="idk">
                    <label for="pwcheck">Pw Check: </label>
                    <input type="password" name="" id="pwcheck" placeholder="password">
                </div>
                <div class="idk">
                    <label for="Tel">Tel: </label>
                    <input type="tel" name="" id="Tel">
                </div>
                <div class="idk">
                    <label for="Address">Address: </label>
                    <input type="text" name="" id="Address">
                </div>
                <div class="idk">
                    <label for="submit"></label>
                    <input type="submit" id="submit">
                    <label for="reset"></label>
                    <input type="reset" id="reset">
                </div>
            </div>
        </fieldset>
    </form>
</body>

</html>
