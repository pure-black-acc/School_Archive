<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th_Lesson</title>
</head>
<style>
    body {
        background-color: lightgray;
        display: flex;
    }

    .main {
        margin: auto;
        display: block;
        align-items: center;
        justify-content: center;
        background-color: white;
        width: 800px;
        height: 500px;
        border-radius: 25px;
    }

    .idk {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 15px;
    }
</style>

<body>
    <form action="">
        <fieldset>
            <legend>Blog</legend>
            <div class="main">
                <p style="justify-content: center; display: flex; font-weight: bold;">Blog</p>
                <div class="idk">
                    <label for="title">Title: </label>
                    <input type="text" name="" id="title">
                </div>
                <div class="idk">
                    <label for="author">Author: </label>
                    <input type="text" name="" id="userpw">
                </div>
                <div class="idk">
                    <label for="visiblility">Public: </label>
                    <input type="checkbox" name="" id="visiblility">
                    <label for="visiblility">Neighbors Only: </label>
                    <input type="checkbox" name="" id="visiblility">
                    <label for="visiblility">Private: </label>
                    <input type="checkbox" name="" id="visiblility">
                </div>
                <div class="idk">
                    <label for="content">Content: </label>
                    <textarea name="" id="content"></textarea>
                </div>
            </div>
        </fieldset>
    </form>
</body>

</html>
