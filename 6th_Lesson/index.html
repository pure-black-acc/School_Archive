<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- select  -->
    <!-- it's a select box which use option tag for option, and optgroup for group  -->
    <!-- Ex) -->
    <!-- <select>
        <optgroup label="group name">
            <option value="value to send">value to send</option>
        </optgroup>
    </select> -->

    <select name="seletion" id="selection">
        <optgroup label="1-n">
            <option value="1">option 1-1</option>
            <option value="2">option 1-2</option>
            <option value="3">option 1-3</option>
        </optgroup>
        <optgroup label="2-n">
            <option value="4">option 2-4</option>
            <option value="5">option 2-5</option>
        </optgroup>
    </select>

    <br><br>

    <select name="seletion" id="seletion" size="3">
        <option value="1">option 1</option>
        <option value="2">option 2</option>
        <option value="3">option 3</option>
        <option value="4">option 4</option>
        <option value="5">option 5</option>
    </select>

    <br><br>

    <!-- drag to select multiple -->
    <select name="1" id="1" multiple>
        <option value="1">option 1</option>
        <option value="2">option 2</option>
        <option value="3">option 3</option>
        <option value="4">option 4</option>
        <option value="5">option 5</option>
    </select>

    <br><br>

    <select>
        <option value="1">option 1</option>
        <option value="2" selected>option 2</option>
        <option value="3">option 3</option>
        <option value="4">option 4</option>
        <option value="5">option 5</option>
    </select>

    <!-- button -->
    <button type="variation">button contents</button>

    <!-- to send to server: submit, to reset contents: reset, plain simple button: button -->
    <button type="submit">
        <img src="#" alt="img">
    </button>

    <!-- disabled -->
    <input type="text" disabled>
    <button disabled>nu-uh</button>

    <!-- read-only -->
    <input type="password" name="" id="" readonly>
    <textarea name="" id="" readonly>hehehe</textarea>

    <!-- maxlength -->
    <input type="text" maxlength="4">
    <textarea name="" id="" maxlength="10"></textarea>
</body>

</html>
