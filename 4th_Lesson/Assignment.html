<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4th_Lesson</title>
</head>
<style>
    body {
        background-color: lightgray;
        display: flex;
    }

    .main {
        margin: auto;
        display: block;
        align-items: center;
        justify-content: center;
        background-color: white;
        width: 800px;
        height: 500px;
        border-radius: 25px;
    }

    .idk {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 15px;
    }
</style>

<body>
    <div class="main">
        <p style="justify-content: center; display: flex; font-weight: bold;">Sign Up</p>
        <div class="idk">
            ID: <input type="text" name="" id="" placeholder="id">
        </div>
        <div class="idk">
            Pw: <input type="text" name="" id="" placeholder="password">
        </div>
        <div class="idk">
            Pw Check: <input type="text" name="" id="" placeholder="password">
        </div>
        <p style="justify-content: center; display: flex;">Gender</p>
        <div class="idk">
            Male: <input type="checkbox" name="" id=""> Female: <input type="checkbox" name="" id="">
        </div>
        <div class="idk">Tel : <input type="tel" name="" id=""></div>
        <div class="idk">Address: <input type="text" name="" id=""></div>
        <div class="idk">Email: <input type="email" name="" id=""></div>
        <div class="idk"><input type="submit"> <input type="reset"></div>

    </div>
</body>

</html>
